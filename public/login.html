<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>登录 - 多云 VM 管理面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/public/style.css">
</head>
<body class="login-page">
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'dark';
      if (theme === 'light') {
        document.body.classList.add('light-theme');
      }
    })();
  </script>
  <main class="login-screen standalone">
    <form id="standalone-login-form" class="login-panel" autocomplete="off">
      <div class="login-brand">
        <div style="display: flex; align-items: center; gap: 14px;">
          <span class="brand-mark">VM</span>
          <div>
            <h1>多云 VM 管理面板</h1>
            <p>登录后才能查看和操作机器</p>
          </div>
        </div>
        <button id="theme-toggle" class="ghost-btn" type="button" title="切换主题" style="min-height: 34px; padding: 0 10px; margin-left: auto;">
          <i id="theme-icon" class="bi bi-moon-stars"></i>
        </button>
      </div>

      <label class="field">
        <span>用户名</span>
        <input id="login-username" type="text" autocomplete="username" required autofocus>
      </label>
      <label class="field">
        <span>密码</span>
        <input id="login-password" type="password" autocomplete="current-password" required>
      </label>
      <button class="primary-btn" type="submit">登录</button>
      <div id="login-error" class="login-error" role="alert"></div>
    </form>
  </main>

  <script src="/public/login.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggleBtn = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');
      
      const updateIcon = (isLight) => {
        if (!icon) return;
        if (isLight) {
          icon.className = 'bi bi-sun';
        } else {
          icon.className = 'bi bi-moon-stars';
        }
      };

      const isLight = document.body.classList.contains('light-theme');
      updateIcon(isLight);

      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          const currentlyLight = document.body.classList.toggle('light-theme');
          localStorage.setItem('theme', currentlyLight ? 'light' : 'dark');
          updateIcon(currentlyLight);
        });
      }
    });
  </script>
</body>
</html>
