oci=begin
[shuai-jp]
group=oci
user=ocid1.user.oc1.example
fingerprint=00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00
tenancy=ocid1.tenancy.oc1.example
compartment_id=ocid1.compartment.oc1.example
region=ap-tokyo-1
key_file=/app/keys/oci.pem
oci=end

gcp=begin
[gcp01]
group=gcp
project_id=your-gcp-project-id
client_email=service-account@your-gcp-project-id.iam.gserviceaccount.com
key_file=/app/keys/gcp01.pem
gcp=end

azure=begin
[az001]
group=azure
subscription_id=your-subscription-id
tenant_id=your-tenant-id
client_id=your-client-id
client_secret=your-client-secret
resource_group=your-resource-group
location=koreacentral
azure=end

cloudflare=begin
[cf01]
api_token=your-cloudflare-api-token
zone_id=your-cloudflare-zone-id
cloudflare=end

dns=begin
[gcp01-main]
cloudflare=cf01
provider=gcp
account=gcp01
vm=asia-east1-a|your-instance-name
domain=vm.example.com
type=A
ttl=1
proxied=false
dns=end

auth=begin
[main]
enabled=false
username=admin
password_hash=$2a$12$replace-with-bcrypt-password-hash
session_secret=replace-with-at-least-32-random-characters
session_hours=12
cookie_secure=false
auth=end
